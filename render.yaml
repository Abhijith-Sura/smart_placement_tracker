services:
  - type: web
    name: placeiq-smart-placement
    runtime: node
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_SMTP_USER
        sync: false
      - key: BREVO_SMTP_PASS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
